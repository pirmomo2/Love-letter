<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>To you, my precious one.</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<script type="module">
			import {
				textFlag,
				emojiCursor,
			} from "https://unpkg.com/cursor-effects@latest/dist/esm.js";
			new emojiCursor({ emoji: ["❤️", "💖", "💘"], delay: 8 });
		</script>
	</head>
	<body>
		<div class="cardout">
			<div class="cardin" id="card">
				<p class="request">Will you Please be my Valentine?</p>
				<div class="response">
					<img class="teddy" src="./teddy.png" />
					<div class="buttons">
						<button class="yes">Yes!!!</button>
						<button class="no">No</button>
					</div>
				</div>
			</div>
		</div>
		<script src="script.js"></script>
	</body>
</html>
